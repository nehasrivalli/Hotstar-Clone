    //     host: ${{ secrets.EC2_HOST }}
    //     username: ubuntu
    //     key: ${{ secrets.EC2_SSH_KEY }}
    //     source: "k8s/*"
    //     target: "/home/ubuntu/k8s"

    // #########################################################
